  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>
    <style>
      .art {
        fill: #39ff14;
        font-size: 6px;
        white-space: pre;
      }
      .flicker {
        animation: flick 3.2s infinite steps(2);
      }
      @keyframes flick {
        0%, 92%, 100% { opacity: 1; }
        94% { opacity: 0.82; }
        96% { opacity: 1; }
      }
      .scanbar {
        animation: sweep 3.6s linear infinite;
      }
      @keyframes sweep {
        0%   { transform: translateY(-40px); }
        100% { transform: translateY(259px); }
      }
    </style>
  </defs>

